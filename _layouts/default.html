<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #fafafa;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      border-bottom: 1px solid #e1e1e1;
      margin-bottom: 40px;
      padding-bottom: 20px;
    }

    nav {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    nav a {
      text-decoration: none;
      color: #0066cc;
      font-size: 14px;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #004d99;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      margin-top: 35px;
      margin-bottom: 15px;
      padding-top: 10px;
      border-top: 2px solid #f0f0f0;
    }

    h3 {
      font-size: 18px;
      font-weight: 600;
      margin-top: 25px;
      margin-bottom: 10px;
    }

    h2:first-child {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    p {
      margin-bottom: 15px;
    }

    a {
      color: #0066cc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    code {
      background-color: #f4f4f4;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
    }

    pre {
      background-color: #f4f4f4;
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
      margin-bottom: 15px;
      line-height: 1.4;
    }

    pre code {
      background-color: transparent;
      padding: 0;
      border-radius: 0;
    }

    ul, ol {
      margin-left: 25px;
      margin-bottom: 15px;
    }

    li {
      margin-bottom: 8px;
    }

    blockquote {
      border-left: 4px solid #ddd;
      padding-left: 15px;
      margin-left: 0;
      margin-bottom: 15px;
      color: #666;
      font-style: italic;
    }

    hr {
      border: none;
      border-top: 1px solid #e1e1e1;
      margin: 30px 0;
    }

    .meta {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .demo-button {
      display: inline-block;
      background-color: #0066cc;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      text-decoration: none;
      margin: 10px 10px 10px 0;
      font-weight: 500;
      transition: background-color 0.2s;
    }

    .demo-button:hover {
      background-color: #004d99;
      text-decoration: none;
    }

    .button {
      display: inline-block;
      background-color: #0066cc;
      color: white;
      padding: 12px 24px;
      text-decoration: none;
      border-radius: 5px;
      font-size: 16px;
      margin-right: 15px;
      margin-bottom: 15px;
      transition: background-color 0.2s;
    }

    .button:hover {
      background-color: #004d99;
    }

    footer {
      border-top: 1px solid #e1e1e1;
      margin-top: 50px;
      padding-top: 20px;
      text-align: center;
      color: #666;
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px 15px;
      }

      h1 {
        font-size: 24px;
      }

      h2 {
        font-size: 20px;
      }

      nav {
        gap: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="{{ site.baseurl }}/" style="color: #333; text-decoration: none;">{{ site.title }}</a></h1>
      <nav>
        <a href="{{ site.baseurl }}/">Home</a>
        <a href="{{ site.baseurl }}/experience">Experience</a>
        <a href="{{ site.baseurl }}/projects">Projects</a>
        <a href="{{ site.baseurl }}/blog">Blog</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer>
      <p>&copy; 2024-2026 {{ site.author }}. Built with Jekyll + GitHub Pages.</p>
    </footer>
  </div>
</body>
</html>
