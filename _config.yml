title: Karim El-Sharkawy | ML Engineer
description: Machine Learning Engineer specializing in NLP, time series forecasting, and production ML systems
author: Karim El-Sharkawy
url: https://karim-sharkawy.github.io
baseurl: "/portfolio"
repository: karim-sharkawy/portfolio

# Jekyll theme
theme: jekyll-theme-minimal

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude files from Jekyll compilation
exclude:
  - .github/
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - LICENSE
  - README.md

# Collections for organized content
collections:
  projects:
    output: true
    permalink: /projects/:path/
  blog_ml:
    output: true
    permalink: /blog/ml/:path/
  blog_logs:
    output: true
    permalink: /blog/build-logs/:path/
  blog_creative:
    output: true
    permalink: /blog/creative/:path/

# Default YAML front matter
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "blog_ml"
    values:
      layout: "post"
      category: "ML & Math"
  - scope:
      path: ""
      type: "blog_logs"
    values:
      layout: "post"
      category: "Build Logs"
  - scope:
      path: ""
      type: "blog_creative"
    values:
      layout: "post"
      category: "Creative"
