title: Karim El-Sharkawy | ML Engineer
description: Machine Learning Engineer specializing in NLP, time series forecasting, and production ML systems
author: Karim El-Sharkawy
url: https://karim-sharkawy.github.io
baseurl: "/portfolio"
repository: karim-sharkawy/portfolio

# Jekyll theme
theme: jekyll-theme-minimal

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude files from Jekyll compilation
exclude:
  - .github/
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - LICENSE
  - README.md

# Collections for organized content
collections_dir: _blog
collections:
  projects:
    output: true
    permalink: /projects/:path/
  experiences:
    output: true
    permalink: /experiences/:path/
  ml:
    output: true
    permalink: /blog/ml/:path/
  math:
    output: true
    permalink: /blog/math/:path/
  creative:
    output: true
    permalink: /blog/creative/:path/

# Default YAML front matter
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "experiences"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "ml"
    values:
      layout: "post"
      category: "ML"
  - scope:
      path: ""
      type: "math"
    values:
      layout: "post"
      category: "Math"
  - scope:
      path: ""
      type: "creative"
    values:
      layout: "post"
      category: "Creative"
